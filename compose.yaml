services:
  forensics-tools:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/forensics_labs
    container_name: forensics-labs

    # Isolation réseau totale pour éviter toute communication d'un malware potentiel (network_mode: none).
    # Si vous analysez des sources saines (CTF, etc..) et avez besoin d'internet, décommentez 'network_mode: host' et commentez 'none'.
    network_mode: none
    # network_mode: host

    # Maintient le conteneur actif pour s'y attacher en shell interactif
    stdin_open: true
    tty: true

    volumes:
      - ./Work:/work:rw,Z

    # Ajout de capacité noyau spécifique
    cap_add:
      # Requis pour monter des images disques brutes (ex: mount -o loop image.dd /mnt) 
      # directement depuis l'intérieur du conteneur.
      - SYS_ADMIN
